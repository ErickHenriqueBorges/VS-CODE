<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="notebook.ico" type="image/x-icon">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
        <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente e diminua seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="IMAGENS/ImagemP.png" type="image/png">
       <source media="(max-width: 1050px)" srcset="IMAGENS/ImagemM.png" type="image/png">
       <img src="IMAGENS/ImagemG.png" alt="imagem Flexivel">
       <!--Ultilizamos o source:midia:type-->
    </picture>
    <h1>Reproduzindo audio </h1>
    <p>Vamos aprender a reproduzindo audios em html5</p>
    <audio src="midia/hino-vasco-da-gama.mp3" controls autoplay></audio>
    <!-- Maneira de colocar o audio, ate o momento so aprendemos a colocar o audio com o sistema de controle -->
    <!-- formatos que sao compativeis MP3 WAV OGG-->
    <audio preload="metadata "autopaly>
        <source src="midia/hino-vasco-da-gama.mp3" type="audio/mpeg">
        <source src="midia/hino-vasco-da-gama.ogg" type="audio/ogg">
        <p>Infelizmente seu navegador nao consegue reproduzir audio <a href="midia/hino-vasco-da-gama.mp3">Clique aqui para baixar o aquivo MP3</a></p>
        <!-- Aqui ultilizamos os source:src-->
        <!-- existem varios preload meta data carrega somente quando voce da o play, none e nada, e o auto o site so funciona quando o audio for completamente baixado-->
    </audio>
</body>
</html>
